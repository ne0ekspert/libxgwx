name: Build and deploy demo

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test
      - run: cargo check --no-default-features

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: actions/configure-pages@v5
      - name: Install wasm-pack
        run: cargo install wasm-pack --locked
      - name: Build wasm package
        run: wasm-pack build --target web --out-dir web/dist/pkg --out-name libxgwx --features wasm --no-default-features
      - name: Copy static demo assets
        run: |
          cp web/index.html web/styles.css web/app.js web/dist/
          test -f web/dist/pkg/libxgwx.js
          test -f web/dist/pkg/libxgwx_bg.wasm
          if find web/dist -name '*.xgwx' | grep -q .; then
            echo "Pages artifact must not include .xgwx fixture files"
            exit 1
          fi
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist
      - id: deployment
        uses: actions/deploy-pages@v4
